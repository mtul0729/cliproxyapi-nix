name: Update packages

on:
  schedule:
    - cron: '17 19 * * *'  # 03:17 Beijing time
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment: cachix
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: cliproxyapi
            filename: pkgs/cliproxyapi/package.nix
          - package: cpa-usage-keeper
            filename: pkgs/cpa-usage-keeper/package.nix
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - uses: cachix/cachix-action@v15
        with:
          name: mtul
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Check for update
        id: update
        run: |
          nix run nixpkgs#nix-update -- ${{ matrix.package }} --flake \
            --override-filename ${{ matrix.filename }} 2>&1 | tee /tmp/nix-update.log
          if grep -q "Already up to date" /tmp/nix-update.log; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push to cachix
        if: steps.update.outputs.updated == 'true'
        run: nix build .#${{ matrix.package }} --print-out-paths | cachix push mtul

      - name: Create PR
        if: steps.update.outputs.updated == 'true'
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PR_TOKEN }}
          title: "chore: bump ${{ matrix.package }}"
          body: Automated version bump via nix-update
          branch: "auto/${{ matrix.package }}-update"
          labels: dependencies

      - name: Enable auto-merge
        if: steps.update.outputs.updated == 'true' && steps.pr.outputs.pull-request-number
        run: gh pr merge --auto --squash ${{ steps.pr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ secrets.PR_TOKEN }}
      - name: Notify on failure
        if: failure()
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "❌ Update failed: ${{ matrix.package }}" \
            --body "Workflow run failed for package **${{ matrix.package }}**.\n\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label bug
        env:
          GH_TOKEN: ${{ secrets.PR_TOKEN }}
