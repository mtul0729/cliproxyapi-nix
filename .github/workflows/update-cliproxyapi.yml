name: Update cliproxyapi

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - uses: cachix/cachix-action@v15
        with:
          name: mtul
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Check for update
        id: update
        run: |
          nix run nixpkgs#nix-update --cliproxyapi --flake \
            --override-filename pkgs/cliproxyapi/package.nix 2>&1 | tee /tmp/nix-update.log
          if grep -q "Already up to date" /tmp/nix-update.log; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push to cachix
        if: steps.update.outputs.updated == 'true'
        run: nix build .#cliproxyapi --print-out-paths | cachix push mtul

      - name: Create PR
        if: steps.update.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          title: "chore: bump cliproxyapi"
          body: Automated version bump via nix-update
          branch: auto/cliproxyapi-update
          labels: dependencies
